  # ── Cron Jobs ───────────────────────────────────────────────────────
  /cron-jobs:
    get:
      tags: [cron-jobs]
      summary: Cron jobs overview
      operationId: getCronOverview
      description: >
        Returns the account's cron tier, current plan, available plans, allowed
        intervals and all jobs. Requires the `cron:read` scope.
      responses:
        "200":
          description: Cron overview
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CronOverview" }
    post:
      tags: [cron-jobs]
      summary: Create a cron job
      operationId: createCronJob
      description: Requires the `cron:write` scope.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url, interval_sec]
              properties:
                name: { type: string }
                url: { type: string, format: uri }
                method: { type: string, example: GET }
                headers:
                  type: object
                  additionalProperties: { type: string }
                body: { type: string }
                interval_sec: { type: integer }
      responses:
        "201":
          description: Created cron job
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CronJob" }
