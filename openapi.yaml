components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ph_live or access JWT
      description: >
        API token (`Authorization: Bearer ph_live_…`, account-scoped, limited to
        granted scopes) or an access JWT. API tokens can never manage tokens.
    cookieAuth:
      type: apiKey
      in: cookie
      name: ph_access
      description: >
        Browser/staff session cookie (HttpOnly access JWT alongside a rotating
        refresh cookie). Staff use the same cookie with a staff JWT.

  parameters:
    PathID:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: Resource ID (`<prefix>_<uuidv7hex>`).
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque pagination cursor (the last resource ID from the previous page).
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer }
      description: Maximum number of items to return.
    StatusQuery:
      name: status
      in: query
      required: false
      schema: { type: string }
      description: Filter by status.
    TypeQuery:
      name: type
      in: query
      required: false
      schema: { type: string }
      description: Filter by type.
    GroupId:
      name: group_id
      in: query
      required: false
      schema: { type: string }
      description: Filter services by service group.
    ProductId:
      name: product_id
      in: query
      required: false
      schema: { type: string }
      description: Filter plans by product.
    From:
      name: from
      in: query
      required: false
      schema: { type: string, format: date-time }
      description: Start of the time range (RFC 3339).
    To:
      name: to
      in: query
      required: false
      schema: { type: string, format: date-time }
      description: End of the time range (RFC 3339).
    Q:
      name: q
      in: query
      required: false
      schema: { type: string }
      description: Free-text search query.
    Locale:
      name: locale
      in: query
      required: false
      schema: { type: string }
      description: BCP-47 locale for localized content.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string }
      description: >
        Makes money/resource-creating writes safe to retry. Replays return the
        stored response with `Idempotency-Replayed: true`.

  headers:
    IdempotencyReplayed:
      description: "`true` when this response is a replay of a prior idempotent request."
      schema: { type: boolean }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    StatusOK:
      description: Status acknowledgement
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: ok }
    Accepted:
      description: Accepted
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, example: accepted }
    CreatedId:
      description: Created resource ID
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DataEnvelope"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
    SessionResponse:
      description: >
        Authenticated session. The access + rotating refresh tokens are set as
        HttpOnly cookies; the body echoes the access token and session id for
        non-browser clients.
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DataEnvelope"
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token: { type: string }
                      session_id: { type: string }
    InstanceResponse:
      description: A service instance
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DataEnvelope"
              - type: object
                properties:
                  data: { $ref: "#/components/schemas/Instance" }
    TicketResponse:
      description: A ticket
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DataEnvelope"
              - type: object
                properties:
                  data: { $ref: "#/components/schemas/Ticket" }
    CidrList:
      description: A list of CIDR strings
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/DataEnvelope"
              - type: object
                properties:
                  data:
                    type: array
                    items: { type: string }

  schemas:
    # ── Envelopes & primitives ───────────────────────────────────────
    DataEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
      description: Standard success envelope wrapping a single object.
    Meta:
      type: object
      properties:
        cursor: { type: string }
        has_more: { type: boolean }
        total: { type: integer }
    ListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: {}
        meta: { $ref: "#/components/schemas/Meta" }
      description: Standard list envelope with pagination meta.
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - IDEMPOTENCY_CONFLICT
                - INSUFFICIENT_BALANCE
                - CREDIT_LIMIT_EXCEEDED
                - NO_CAPACITY
                - RATE_LIMITED
                - NOT_IMPLEMENTED
                - PAYMENT_FAILED
                - WEBHOOK_SIGNATURE_INVALID
                - INTERNAL
            message: { type: string }
            docs:
              type: string
              example: https://docs.palmahost.sh/errors/VALIDATION_ERROR
    Money:
      type: object
      required: [cents, currency]
      properties:
        cents: { type: integer, format: int64 }
        currency: { type: string, example: EUR }

    # ── Catalog ───────────────────────────────────────────────────────
    Product:
      type: object
      required: [id, kind, category, name_i18n, description_i18n, active, sort_order]
      properties:
        id: { type: string }
        kind: { type: string, example: vps }
        category: { type: string }
        name_i18n:
          type: object
          additionalProperties: { type: string }
        description_i18n:
          type: object
          additionalProperties: { type: string }
        active: { type: boolean }
        sort_order: { type: integer }
    Plan:
      type: object
      required: [id, product_id, code, specs, base_price_cents_month, popular, available_locations, active]
      properties:
        id: { type: string }
        product_id: { type: string }
        code: { type: string, example: es.medium }
        specs:
          type: object
          additionalProperties: true
        base_price_cents_month: { type: integer, format: int64 }
        hourly_price_cents:
          type: [integer, "null"]
          format: int64
        popular: { type: boolean }
        available_locations:
          type: array
          items: { type: string }
        active: { type: boolean }
    Location:
      type: object
      required: [id, code, name, country, flag, active]
      properties:
        id: { type: string }
        code: { type: string, example: mad }
        name: { type: string }
        country: { type: string }
        flag: { type: string }
        ip_block_cidr:
          type: [string, "null"]
        active: { type: boolean }

    # ── Auth / identity ───────────────────────────────────────────────
    User:
      type: object
      required: [id, account_id, email, name, status, created_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
    Session:
      type: object
      required: [id, user_id, created_at, last_seen_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        device: { type: string }
        ip: { type: string }
        user_agent: { type: string }
        created_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        revoked_at:
          type: [string, "null"]
          format: date-time
    APIToken:
      type: object
      required: [id, account_id, name, prefix, scopes, created_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        name: { type: string }
        prefix: { type: string }
        scopes:
          type: array
          items: { type: string }
        ip_allowlist:
          type: array
          items: { type: string }
        rate_limit_rpm:
          type: [integer, "null"]
        expires_at:
          type: [string, "null"]
          format: date-time
        last_used_at:
          type: [string, "null"]
          format: date-time
        revoked_at:
          type: [string, "null"]
          format: date-time
        created_at: { type: string, format: date-time }

    # ── Account ───────────────────────────────────────────────────────
    AccountProfile:
      type: object
      required: [id, primary_user_id, name, email, balance, currency, language, service_limit, status, created_at, updated_at]
      properties:
        id: { type: string }
        primary_user_id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        company_name: { type: string }
        tax_id: { type: string }
        billing_address:
          type: object
          additionalProperties: true
        holded_contact_id:
          type: [string, "null"]
        balance: { $ref: "#/components/schemas/Money" }
        currency: { type: string }
        language: { type: string }
        service_limit: { type: integer }
        status: { type: string }
        ban_reason:
          type: [string, "null"]
        notification_channels:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TeamMember:
      type: object
      required: [user_id, account_id, email, name, role_in_account, permissions, status, created_at]
      properties:
        user_id: { type: string }
        account_id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role_in_account: { type: string }
        permissions:
          type: array
          items: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        last_login_at:
          type: [string, "null"]
          format: date-time
    ServiceGroup:
      type: object
      required: [id, name, services_count, created_at]
      properties:
        id: { type: string }
        name: { type: string }
        services_count: { type: integer }
        created_at: { type: string, format: date-time }

    # ── Billing ───────────────────────────────────────────────────────
    Transaction:
      type: object
      required: [id, type, account_id, amount_cents, balance_after_cents, currency, created_at]
      properties:
        id: { type: string }
        type: { type: string }
        account_id: { type: string }
        amount_cents: { type: integer, format: int64 }
        balance_after_cents: { type: integer, format: int64 }
        currency: { type: string }
        service_id:
          type: [string, "null"]
        payment_id:
          type: [string, "null"]
        reason:
          type: [string, "null"]
        staff_id:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
    Invoice:
      type: object
      required: [id, number, total_cents, currency, status]
      properties:
        id: { type: string }
        number: { type: string }
        total_cents: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string }
        issued_at:
          type: [string, "null"]
          format: date-time
    AutoTopup:
      type: object
      required: [enabled, threshold_cents, amount_cents]
      properties:
        enabled: { type: boolean }
        threshold_cents: { type: integer, format: int64 }
        amount_cents: { type: integer, format: int64 }
        method_id:
          type: [string, "null"]
    GiftCard:
      type: object
      required: [id, amount_cents, currency, created_at]
      properties:
        id: { type: string }
        amount_cents: { type: integer, format: int64 }
        currency: { type: string }
        redeemed_by:
          type: [string, "null"]
        redeemed_at:
          type: [string, "null"]
          format: date-time
        expires_at:
          type: [string, "null"]
          format: date-time
        created_by_staff:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
    Promotion:
      type: object
      required: [id, type, value, code, usage, max_uses, used_count, created_at]
      properties:
        id: { type: string }
        type: { type: string }
        value: { type: number }
        code: { type: string }
        usage: { type: string }
        max_uses: { type: integer }
        used_count: { type: integer }
        expires_at:
          type: [string, "null"]
          format: date-time
        conditions:
          type: [object, "null"]
          additionalProperties: true
        bonus_per_cents:
          type: [integer, "null"]
          format: int64
        created_at: { type: string, format: date-time }

    # ── Services ──────────────────────────────────────────────────────
    Instance:
      type: object
      required: [id, account_id, plan_id, location_id, kind, label, hostname, status, billing_period, unit_price_locked_cents, hypervisor, external_id, external_node, os_image, primary_ip, config, created_at, updated_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        plan_id: { type: string }
        location_id: { type: string }
        kind: { type: string }
        label: { type: string }
        hostname: { type: string }
        status: { type: string }
        billing_period: { type: string }
        unit_price_locked_cents: { type: integer, format: int64 }
        price_locked_at:
          type: [string, "null"]
          format: date-time
        next_renewal_at:
          type: [string, "null"]
          format: date-time
        suspended_at:
          type: [string, "null"]
          format: date-time
        grace_until:
          type: [string, "null"]
          format: date-time
        terminated_at:
          type: [string, "null"]
          format: date-time
        last_charged_at:
          type: [string, "null"]
          format: date-time
        hypervisor: { type: string }
        external_id: { type: string }
        external_node: { type: string }
        os_image: { type: string }
        primary_ip: { type: string }
        config:
          type: object
          additionalProperties: true
        group_id:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CreateServiceInput:
      type: object
      required: [plan_id, location_id, label, hostname, os_image, billing_period]
      properties:
        plan_id: { type: string }
        location_id: { type: string }
        label: { type: string }
        hostname: { type: string }
        os_image: { type: string, example: ubuntu-24.04 }
        billing_period: { type: string, example: monthly }
        ssh_key_ids:
          type: array
          items: { type: string }
        group_id: { type: string }
        config:
          type: object
          additionalProperties: true
    ServerStatus:
      type: object
      required: [power_state, cpu, maxcpu, mem, maxmem, disk, maxdisk, netin, netout, uptime]
      properties:
        power_state: { type: string }
        cpu: { type: number }
        maxcpu: { type: integer }
        mem: { type: integer, format: int64 }
        maxmem: { type: integer, format: int64 }
        disk: { type: integer, format: int64 }
        maxdisk: { type: integer, format: int64 }
        netin: { type: integer, format: int64 }
        netout: { type: integer, format: int64 }
        uptime: { type: integer, format: int64 }

    # ── Network ───────────────────────────────────────────────────────
    IP:
      type: object
      required: [id, service_id, address, version, is_primary, created_at]
      properties:
        id: { type: string }
        service_id: { type: string }
        address: { type: string }
        version: { type: integer, example: 4 }
        is_primary: { type: boolean }
        rdns: { type: string }
        block_id:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
    FirewallRule:
      type: object
      required: [direction, action, protocol, port_range, source_cidr, priority]
      properties:
        id: { type: string }
        service_id: { type: string }
        direction: { type: string, enum: [in, out] }
        action: { type: string, enum: [allow, deny] }
        protocol: { type: string, enum: [tcp, udp, icmp, any] }
        port_range: { type: string, example: "30000-30100" }
        source_cidr: { type: string }
        priority: { type: integer }
        comment: { type: string }
        created_at: { type: string, format: date-time }
    PrivateNetwork:
      type: object
      required: [id, account_id, name, cidr, services, created_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        name: { type: string }
        cidr: { type: string }
        vlan:
          type: [integer, "null"]
        location_id:
          type: [string, "null"]
        services:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }

    # ── Snapshots & backups ───────────────────────────────────────────
    Snapshot:
      type: object
      required: [id, service_id, name, external_id, size_bytes, status, created_at]
      properties:
        id: { type: string }
        service_id: { type: string }
        name: { type: string }
        external_id: { type: string }
        size_bytes: { type: integer, format: int64 }
        status: { type: string }
        created_at: { type: string, format: date-time }
    Backup:
      type: object
      required: [id, service_id, schedule, retention, external_id, status]
      properties:
        id: { type: string }
        service_id: { type: string }
        schedule: { type: string }
        retention: { type: integer }
        external_id: { type: string }
        status: { type: string }
        last_run_at:
          type: [string, "null"]
          format: date-time

    # ── Monitoring ────────────────────────────────────────────────────
    MetricPoint:
      type: object
      required: [service_id, ts, cpu_pct, ram_bytes, disk_bytes, net_in_bytes, net_out_bytes]
      properties:
        service_id: { type: string }
        ts: { type: string, format: date-time }
        cpu_pct: { type: number }
        ram_bytes: { type: integer, format: int64 }
        disk_bytes: { type: integer, format: int64 }
        net_in_bytes: { type: integer, format: int64 }
        net_out_bytes: { type: integer, format: int64 }
    CloudAlert:
      type: object
      required: [name, metric, operator, threshold, duration_seconds, cooldown_seconds, target_type, action, channel]
      properties:
        id: { type: string }
        account_id: { type: string }
        name: { type: string }
        description: { type: string }
        service_id:
          type: [string, "null"]
        metric: { type: string }
        operator: { type: string, enum: [gt, lt, gte, lte, eq] }
        threshold: { type: number }
        duration_seconds: { type: integer }
        cooldown_seconds: { type: integer }
        target_type: { type: string }
        action: { type: string }
        channel: { type: string }

    # ── DDoS ──────────────────────────────────────────────────────────
    DdosProfile:
      type: object
      required: [code, name_i18n]
      properties:
        code: { type: string }
        name_i18n:
          type: object
          additionalProperties: { type: string }
    DdosEvent:
      type: object
      required: [vector, volume_mbps, pps, started_at]
      properties:
        vector: { type: string }
        volume_mbps: { type: number }
        pps: { type: integer, format: int64 }
        started_at: { type: string, format: date-time }
        ended_at:
          type: [string, "null"]
          format: date-time

    # ── SSH keys ──────────────────────────────────────────────────────
    Key:
      type: object
      required: [id, account_id, name, public_key, fingerprint, created_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        name: { type: string }
        public_key: { type: string }
        fingerprint: { type: string }
        created_at: { type: string, format: date-time }

    # ── App marketplace ───────────────────────────────────────────────
    AppVariable:
      type: object
      required: [key, type]
      properties:
        key: { type: string }
        label:
          type: object
          properties:
            es: { type: string }
            en: { type: string }
        help:
          type: object
          properties:
            es: { type: string }
            en: { type: string }
        type: { type: string }
        required: { type: boolean }
        default: { type: string }
        generate: { type: boolean }
        secret: { type: boolean }
    AppPort:
      type: object
      required: [port]
      properties:
        port: { type: integer }
        scheme: { type: string }
        label: { type: string }
        primary: { type: boolean }
    App:
      type: object
      required: [slug, name, category, method]
      properties:
        slug: { type: string }
        name: { type: string }
        tagline:
          type: object
          properties:
            es: { type: string }
            en: { type: string }
        description:
          type: object
          properties:
            es: { type: string }
            en: { type: string }
        category: { type: string }
        icon: { type: string }
        version: { type: string }
        website: { type: string }
        tags:
          type: array
          items: { type: string }
        targets:
          type: array
          items: { type: string, example: vps }
        method:
          type: string
          enum: [docker_compose, script]
        min_memory_mb: { type: integer }
        min_disk_gb: { type: integer }
        variables:
          type: array
          items: { $ref: "#/components/schemas/AppVariable" }
        ports:
          type: array
          items: { $ref: "#/components/schemas/AppPort" }
    AppInstall:
      type: object
      required: [id, service_id, app_slug, app_name, status, created_at, updated_at]
      properties:
        id: { type: string }
        service_id: { type: string }
        app_slug: { type: string }
        app_name: { type: string }
        status:
          type: string
          enum: [pending, installing, installed, failed, removing, removed]
        params:
          type: object
          additionalProperties: { type: string }
        access_url: { type: string }
        output: { type: string }
        error: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Cron Jobs ─────────────────────────────────────────────────────
    CronJob:
      type: object
      required: [id, name, url, method, interval_sec, enabled, next_run_at, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string, format: uri }
        method: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        body: { type: string }
        interval_sec: { type: integer }
        enabled: { type: boolean }
        last_run_at:
          type: [string, "null"]
          format: date-time
        last_status:
          type: [integer, "null"]
        last_ok:
          type: [boolean, "null"]
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CronRun:
      type: object
      required: [id, started_at, duration_ms, status_code, ok]
      properties:
        id: { type: string }
        started_at: { type: string, format: date-time }
        duration_ms: { type: integer }
        status_code: { type: integer }
        ok: { type: boolean }
        error: { type: string }
    CronPlan:
      type: object
      required: [tier, name, price_cents, max_jobs, min_interval_sec, run_history_days]
      properties:
        tier: { type: string }
        name: { type: string }
        price_cents: { type: integer }
        max_jobs: { type: integer }
        min_interval_sec: { type: integer }
        run_history_days: { type: integer }
    CronOverview:
      type: object
      required: [tier, plan, plans, intervals, jobs, locked_price_cents]
      properties:
        tier: { type: string }
        plan: { $ref: "#/components/schemas/CronPlan" }
        plans:
          type: array
          items: { $ref: "#/components/schemas/CronPlan" }
        intervals:
          type: array
          items: { type: integer }
        jobs:
          type: array
          items: { $ref: "#/components/schemas/CronJob" }
        locked_price_cents: { type: integer }
        next_renewal_at:
          type: [string, "null"]
          format: date-time
        pending_tier: { type: string }

    # ── Webhooks ──────────────────────────────────────────────────────
    WebhookEndpoint:
      type: object
      required: [id, account_id, url, events, active]
      properties:
        id: { type: string }
        account_id: { type: string }
        url: { type: string, format: uri }
        events:
          type: array
          items: { type: string }
        active: { type: boolean }
    WebhookDelivery:
      type: object
      required: [id, webhook_id, event_id, status, attempts]
      properties:
        id: { type: string }
        webhook_id: { type: string }
        event_id: { type: string }
        status: { type: string }
        response_code:
          type: [integer, "null"]
        attempts: { type: integer }

    # ── Affiliate ─────────────────────────────────────────────────────
    Affiliate:
      type: object
      required: [account_id, code, pct, clicks, signups, conversions, earnings_cents]
      properties:
        account_id: { type: string }
        code: { type: string }
        pct: { type: number }
        clicks: { type: integer }
        signups: { type: integer }
        conversions: { type: integer }
        earnings_cents: { type: integer, format: int64 }
    AffiliatePayout:
      type: object
      required: [id, account_id, amount_cents, status]
      properties:
        id: { type: string }
        account_id: { type: string }
        amount_cents: { type: integer, format: int64 }
        status: { type: string }

    # ── Support ───────────────────────────────────────────────────────
    Ticket:
      type: object
      required: [id, account_id, subject, department, priority, status, created_at, updated_at]
      properties:
        id: { type: string }
        account_id: { type: string }
        subject: { type: string }
        department: { type: string }
        priority: { type: string }
        status: { type: string }
        assigned_staff_id:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        assignee_name: { type: string }
        requester_name: { type: string }
        requester_email: { type: string }
        assignees:
          type: array
          items: { type: string }
    TicketMessage:
      type: object
      required: [id, ticket_id, author_type, author_id, body, internal, created_at]
      properties:
        id: { type: string }
        ticket_id: { type: string }
        author_type: { type: string }
        author_id: { type: string }
        author_name: { type: string }
        body: { type: string }
        internal: { type: boolean }
        created_at: { type: string, format: date-time }
    KBArticle:
      type: object
      required: [slug, title, excerpt, title_i18n, body_i18n, category, published]
      properties:
        slug: { type: string }
        title: { type: string }
        excerpt: { type: string }
        title_i18n:
          type: object
          additionalProperties: { type: string }
        body_i18n:
          type: object
          additionalProperties: { type: string }
        category: { type: string }
