    post:
      tags: [cron-jobs]
      summary: Upgrade the cron tier
      operationId: upgradeCronTier
      description: Requires the `cron:write` scope.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { type: string }
                coupon: { type: string }
