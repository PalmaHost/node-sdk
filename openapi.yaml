openapi: 3.1.0
info:
  title: PalmaHost Cloud API
  version: 1.0.0
  description: >
    Public API for PalmaHost Cloud. The panel is just another client of this
    API — anything the panel does can be done here. JSON always; cursor
    pagination; stable error codes; idempotency on money/resource writes.


    This document is the source of truth: docs, mocks and SDKs derive from it,
    and it tracks `docs/api-surface.md` exactly (field names, paths, methods,
    auth).


    ## Conventions

    - **Success (object)**: `{ "data": <object> }`.

    - **Success (list)**: `{ "data": [...], "meta": { "cursor": "<last-id>",
      "has_more": bool, "total": int } }` (`cursor`/`total` omitted when zero;
      a nil slice serializes as `[]`).

    - **Error**: `{ "error": { "code": "VALIDATION_ERROR", "message": "...",
      "docs": "https://docs.palmahost.sh/errors/<CODE>" } }`.

    - **Money**: integer minor units (cents) + ISO-4217 currency; never floats.
      Most structs use raw `*_cents` int64 fields.

    - **IDs**: `<prefix>_<uuidv7hex>` (time-ordered, used as pagination cursors).

    - **Idempotency**: write endpoints accept `Idempotency-Key: <key>`; replays
      return the stored response with `Idempotency-Replayed: true`.
  contact:
    name: PalmaHost
    url: https://docs.palmahost.sh

servers:
  - url: https://my.palmahost.sh/v1
    description: Production

security:
  - bearerAuth: []

tags:
  - name: catalog
    description: Public product/plan/location catalog.
  - name: auth
    description: Registration, login, sessions, MFA and passkeys.
  - name: tokens
    description: API token management (session-only; tokens can never manage tokens).
  - name: account
    description: Account profile, preferences, team, IP allowlist and groups.
  - name: billing
    description: Balance, ledger, top-ups, invoices, auto-topup and gift cards.
  - name: promotions
    description: Promotion code validation.
  - name: payments
    description: Provider payment webhooks (public, signature-verified).
  - name: services
    description: Compute instances and their lifecycle.
  - name: network
    description: IPs, firewall rules and private networks.
  - name: snapshots
    description: Instance snapshots.
  - name: backups
    description: Scheduled backups.
  - name: monitoring
    description: Metrics and cloud alerts.
  - name: ddos
    description: DDoS protection profiles and events.
  - name: ssh-keys
    description: SSH public keys and per-service attachment.
  - name: apps
    description: App marketplace catalog and per-service 1-click installs.
  - name: cron-jobs
    description: Scheduled URL pinger jobs, plans and run history.
  - name: webhooks
    description: Outbound webhook endpoints and deliveries.
  - name: affiliate
    description: Affiliate program, tracking and payouts.
  - name: support
    description: Tickets, knowledge base and shared credentials.
  - name: operational
    description: Health, readiness, version, metrics and ping.
  - name: admin-auth
    description: Staff authentication and impersonation.
  - name: admin-staff
    description: Staff member management.
  - name: admin-core
    description: Catalog, account, billing and service administration.
  - name: admin-support
    description: Staff support queue.
  - name: admin-fleet
    description: Cluster, node and guest fleet management.

paths:
  # ── Operational (not under /v1, documented for completeness) ──────────
  /healthz:
    servers:
      - url: https://my.palmahost.sh
    get:
      tags: [operational]
      summary: Liveness probe
      operationId: getHealthz
      security: []
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /readyz:
    servers:
      - url: https://my.palmahost.sh
    get:
      tags: [operational]
      summary: Readiness probe
      operationId: getReadyz
      security: []
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
        "503": { $ref: "#/components/responses/ErrorResponse" }
  /version:
    servers:
      - url: https://my.palmahost.sh
    get:
      tags: [operational]
      summary: Build version
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string }
                  built_at: { type: string, format: date-time }
  /metrics:
    servers:
      - url: https://my.palmahost.sh
    get:
      tags: [operational]
      summary: Prometheus metrics
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema: { type: string }
  /ping:
    get:
      tags: [operational]
      summary: Authenticated ping
      operationId: ping
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }

  # ── Catalog (public) ──────────────────────────────────────────────────
  /products:
    get:
      tags: [catalog]
      summary: List products
      operationId: listProducts
      security: []
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Product" }
  /plans:
    get:
      tags: [catalog]
      summary: List plans
      operationId: listPlans
      security: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Plan" }
  /locations:
    get:
      tags: [catalog]
      summary: List locations
      operationId: listLocations
      security: []
      responses:
        "200":
          description: Locations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Location" }
  /locations/{id}/latency:
    parameters:
      - $ref: "#/components/parameters/PathID"
    get:
      tags: [catalog]
      summary: Latency probe hint for a location
      operationId: getLocationLatency
      security: []
      responses:
        "200":
          description: Latency probe info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataEnvelope"
                # data: { location_id, code, probe_url }

  # ── Auth ────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [auth]
      summary: Register a new account
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                name: { type: string }
                company_name: { type: string }
                language: { type: string }
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "409": { $ref: "#/components/responses/ErrorResponse" }
  /auth/login:
    post:
      tags: [auth]
      summary: Password + optional TOTP login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                totp_code: { type: string }
      responses:
        "200": { $ref: "#/components/responses/SessionResponse" }
        "401": { $ref: "#/components/responses/ErrorResponse" }
  /auth/logout:
    post:
      tags: [auth]
      summary: Log out the current session
      operationId: logout
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotate the refresh token (reuse detection)
      operationId: refreshToken
      security:
        - cookieAuth: []
        - {}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "200": { $ref: "#/components/responses/SessionResponse" }
        "401": { $ref: "#/components/responses/ErrorResponse" }
  /auth/verify-email:
    post:
      tags: [auth]
      summary: Verify an email address
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: verified }
  /auth/password/reset-request:
    post:
      tags: [auth]
      summary: Request a password reset email
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /auth/password/reset:
    post:
      tags: [auth]
      summary: Complete a password reset
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string }
                new_password: { type: string, format: password }
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /auth/passkey/login/begin:
    post:
      tags: [auth]
      summary: Begin a passkey login ceremony
      operationId: beginPasskeyLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: WebAuthn assertion options
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  options: { type: object, additionalProperties: true }
  /auth/passkey/login/finish:
    post:
      tags: [auth]
      summary: Finish a passkey login ceremony
      operationId: finishPasskeyLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, assertion]
              properties:
                session_id: { type: string }
                assertion: { type: object, additionalProperties: true }
      responses:
        "200": { $ref: "#/components/responses/SessionResponse" }
  /auth/password/change:
    post:
      tags: [auth]
      summary: Change the authenticated user's password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /auth/sessions:
    get:
      tags: [auth]
      summary: List active sessions
      operationId: listSessions
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Session" }
  /auth/sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/PathID"
    delete:
      tags: [auth]
      summary: Revoke a session
      operationId: revokeSession
      responses:
        "204": { description: Revoked }
  /auth/totp/enroll:
    post:
      tags: [auth]
      summary: Begin TOTP enrollment
      operationId: enrollTotp
      responses:
        "200":
          description: TOTP secret and provisioning URI
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  provisioning_uri: { type: string }
  /auth/totp/confirm:
    post:
      tags: [auth]
      summary: Confirm TOTP enrollment
      operationId: confirmTotp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: confirmed }
  /auth/passkey/register/begin:
    post:
      tags: [auth]
      summary: Begin a passkey registration ceremony
      operationId: beginPasskeyRegistration
      responses:
        "200":
          description: WebAuthn creation options
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string }
                  options: { type: object, additionalProperties: true }
  /auth/passkey/register/finish:
    post:
      tags: [auth]
      summary: Finish a passkey registration ceremony
      operationId: finishPasskeyRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, credential]
              properties:
                session_id: { type: string }
                name: { type: string }
                credential: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: registered }

  # ── API tokens (session-only) ────────────────────────────────────────
  /tokens:
    get:
      tags: [tokens]
      summary: List API tokens
      operationId: listTokens
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/APIToken" }
    post:
      tags: [tokens]
      summary: Create an API token (secret shown once)
      operationId: createToken
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string }
                scopes:
                  type: array
                  items: { type: string, example: "services:read" }
                ip_allowlist:
                  type: array
                  items: { type: string }
                rate_limit_rpm: { type: integer }
      responses:
        "201":
          description: Created token (with one-time secret)
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token: { $ref: "#/components/schemas/APIToken" }
                          secret: { type: string }
  /tokens/{id}:
    parameters:
      - $ref: "#/components/parameters/PathID"
    delete:
      tags: [tokens]
      summary: Revoke a token
      operationId: revokeToken
      responses:
        "204": { description: Revoked }

  # ── Account ───────────────────────────────────────────────────────────
  /account:
    get:
      tags: [account]
      summary: Get account profile
      operationId: getAccount
      responses:
        "200":
          description: Account profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AccountProfile" }
    patch:
      tags: [account]
      summary: Update account profile
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                company_name: { type: string }
                tax_id: { type: string }
                billing_address: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AccountProfile" }
  /account/preferences:
    put:
      tags: [account]
      summary: Update account preferences
      operationId: updatePreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language, currency, notification_channels]
              properties:
                language: { type: string }
                currency: { type: string }
                notification_channels:
                  type: array
                  items: { type: string }
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /account/support-pin:
    put:
      tags: [account]
      summary: Set the account support PIN
      operationId: setSupportPin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin: { type: string }
      responses:
        "200": { $ref: "#/components/responses/StatusOK" }
  /account/team/:
    get:
      tags: [account]
      summary: List team members
      operationId: listTeamMembers
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/TeamMember" }
    post:
      tags: [account]
      summary: Invite a team member
      operationId: createTeamMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, permissions]
              properties:
                email: { type: string, format: email }
                permissions:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TeamMember" }
  /account/team/{userID}:
    parameters:
      - name: userID
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [account]
      summary: Remove a team member
      operationId: deleteTeamMember
      responses:
        "204": { description: Removed }
  /account/ip-allowlist/:
    get:
      tags: [account]
      summary: Get the account IP allowlist
      operationId: getIpAllowlist
      responses:
        "200": { $ref: "#/components/responses/CidrList" }
    put:
      tags: [account]
      summary: Replace the account IP allowlist
      operationId: setIpAllowlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cidrs]
              properties:
                cidrs:
                  type: array
                  items: { type: string }
      responses:
        "200": { $ref: "#/components/responses/CidrList" }
  /account/groups/:
    get:
      tags: [account]
      summary: List service groups (projects)
      operationId: listServiceGroups
      responses:
        "200":
          description: Service groups
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/ServiceGroup" }
    post:
      tags: [account]
      summary: Create a service group
      operationId: createServiceGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ServiceGroup" }
  /account/groups/{id}:
    parameters:
      - $ref: "#/components/parameters/PathID"
    delete:
      tags: [account]
      summary: Delete a service group
      operationId: deleteServiceGroup
      responses:
        "204": { description: Deleted }

  # ── Billing ─────────────────────────────────────────────────────────
  /billing/balance:
    get:
      tags: [billing]
      summary: Current balance
      operationId: getBalance
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Money" }
  /billing/transactions:
    get:
      tags: [billing]
      summary: List ledger transactions
      operationId: listTransactions
      parameters:
        - $ref: "#/components/parameters/TypeQuery"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Transaction" }
  /billing/topup:
    post:
      tags: [billing]
      summary: Top up balance via a payment provider
      operationId: createTopup
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_cents, provider, currency, withdrawal_waived]
              properties:
                amount_cents: { type: integer, format: int64 }
                provider: { type: string, enum: [redsys, paypal, cryptomus] }
                currency: { type: string, example: EUR }
                withdrawal_waived: { type: boolean }
      responses:
        "200":
          description: Payment intent with redirect URL
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          payment_id: { type: string }
                          redirect_url: { type: string }
        "409": { $ref: "#/components/responses/ErrorResponse" }
  /billing/invoices:
    get:
      tags: [billing]
      summary: List invoices
      operationId: listInvoices
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ListEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Invoice" }
  /billing/invoices/{id}/pdf:
    parameters:
      - $ref: "#/components/parameters/PathID"
    get:
      tags: [billing]
      summary: Download an invoice PDF
      operationId: getInvoicePdf
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema: { type: string, format: binary }
        "404": { $ref: "#/components/responses/ErrorResponse" }
  /billing/auto-topup:
    get:
      tags: [billing]
      summary: Get auto top-up configuration
      operationId: getAutoTopup
      responses:
        "200":
          description: Auto top-up config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AutoTopup" }
    put:
      tags: [billing]
      summary: Configure auto top-up
      operationId: updateAutoTopup
      requestBody:
        required: true
        content:
          application/json:
