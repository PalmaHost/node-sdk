    parameters:
      - $ref: "#/components/parameters/PathID"
    get:
      tags: [cron-jobs]
      summary: Get a cron job
      operationId: getCronJob
      description: Requires the `cron:read` scope.
      responses:
        "200":
          description: Cron job
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CronJob" }
    patch:
      tags: [cron-jobs]
      summary: Update a cron job
      operationId: updateCronJob
      description: Partial update. Requires the `cron:write` scope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                url: { type: string, format: uri }
                method: { type: string }
                headers:
                  type: object
                  additionalProperties: { type: string }
                body: { type: string }
                interval_sec: { type: integer }
                enabled: { type: boolean }
      responses:
        "200":
          description: Updated cron job
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/CronJob" }
    delete:
      tags: [cron-jobs]
      summary: Delete a cron job
      operationId: deleteCronJob
